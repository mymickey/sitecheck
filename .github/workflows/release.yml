name: Release macOS App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.22.1"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails v3
        run: |
          git clone --depth 1 https://github.com/wailsapp/wails.git
          cd wails/v3/cmd/wails3
          go install .

      - name: Build release artifacts
        run: make dmg

      - name: Create ZIP
        run: |
          ditto -c -k --keepParent bin/sitecheck.app bin/SiteCheck.app.zip

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bin/dmg/SiteCheck.dmg
            bin/SiteCheck.app.zip
          make_latest: true
        if: startsWith(github.ref, 'refs/tags/')

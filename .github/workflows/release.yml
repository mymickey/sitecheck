name: Release macOS App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails v3
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Test
        run: go test ./...

      - name: Build app bundle
        run: wails3 task darwin:package:universal

      - name: Create DMG
        run: |
          mkdir -p bin/dmg
          hdiutil create -volname SiteCheck -srcfolder bin/sitecheck.app -ov -format UDZO bin/dmg/SiteCheck.dmg
          ditto -c -k --keepParent bin/sitecheck.app bin/SiteCheck.app.zip

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bin/dmg/SiteCheck.dmg
            bin/SiteCheck.app.zip
          make_latest: true
        if: startsWith(github.ref, 'refs/tags/')
